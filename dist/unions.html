<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Browse the official member directory of Samara University Peace Forum Union — all registered student delegates and union leaders." />
  <link rel="icon" type="image/jpeg" href="/logo.jpg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <title>Members Directory — Samara Peace Forum Union</title>
  <script>
    try {
      const t = localStorage.getItem('spf-theme') ||
        (matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
      document.documentElement.setAttribute('data-theme', t);
    } catch(e) {}
  </script>
  <script type="module" crossorigin src="/assets/main-Dne55LGc.js"></script>
  <link rel="stylesheet" crossorigin href="/assets/main-ELywlkzf.css">
</head>
<body data-page="unions">

  <div id="preloader" class="preloader" aria-hidden="true">
    <div class="preloader__inner">
      <div class="preloader__spinner">
        <img src="/logo.jpg" alt="" class="preloader__logo" width="52" height="52" />
        <div class="preloader__ring preloader__ring--outer"></div>
        <div class="preloader__ring preloader__ring--inner"></div>
      </div>
      <p class="preloader__text">Loading…</p>
    </div>
  </div>

  <div id="page-progress" class="page-progress" aria-hidden="true"></div>
  <header id="navbar" class="navbar" role="banner"></header>

  <main>
    <div class="page-hero">
      <div class="container">
        <p class="page-hero__eyebrow" data-motion="slideDown" data-motion-duration="0.55">👥 Directory</p>
        <h1 class="page-hero__title" data-motion="slideUp" data-motion-delay="0.12" data-motion-duration="0.95">Members Directory</h1>
        <p class="page-hero__desc" data-motion="blurRight" data-motion-delay="0.24" data-motion-duration="0.85">
          Browse the official registry of verified student delegates, union leaders,
          and peace ambassadors at Samara University.
        </p>
      </div>
    </div>

    <section class="section--sm">
      <div class="container">
        <!-- Search + filters -->
        <div class="search-area" data-motion="slideRight" data-motion-duration="0.65" data-motion-threshold="0.05">
          <div class="search-wrap">
            <span class="search-icon">🔍</span>
            <input type="search" id="members-search"
                   class="field__input search-input"
                   placeholder="Search members, email, chapter…"
                   aria-label="Search members" />
          </div>
        </div>

        <div class="filter-bar" id="unions-filter-bar" role="group" aria-label="Filter by chapter"
             data-motion="rotateIn" data-motion-delay="0.1" data-motion-duration="0.6">
          <button class="filter-btn is-active" data-filter="All Divisions">All Divisions</button>
        </div>

        <div class="grid grid--4" id="members-grid" role="list">
          <!-- Populated by unions.js -->
        </div>
      </div>
    </section>
  </main>

  <footer id="footer" class="footer" role="contentinfo"></footer>
  <div id="toast-container" class="toast-container" aria-live="polite"></div>
</body>
</html>
