<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Latest news and updates from the Samara University Peace Forum Union." />
  <link rel="icon" type="image/jpeg" href="/logo.jpg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet" />
  <title>News & Updates — Samara Peace Forum Union</title>
  <script>
    try {
      const t = localStorage.getItem('spf-theme') ||
        (matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
      document.documentElement.setAttribute('data-theme', t);
    } catch(e) {}
  </script>
  <script type="module" crossorigin src="/assets/main-BojxA6tl.js"></script>
  <link rel="stylesheet" crossorigin href="/assets/main-CK9uY-PN.css">
</head>
<body data-page="news">

  <div id="preloader" class="preloader" aria-hidden="true">
    <div class="preloader__inner">
      <div class="preloader__spinner">
        <img src="/logo.jpg" alt="" class="preloader__logo" width="52" height="52" />
        <div class="preloader__ring preloader__ring--outer"></div>
        <div class="preloader__ring preloader__ring--inner"></div>
      </div>
      <p class="preloader__text">Loading…</p>
    </div>
  </div>

  <div id="page-progress" class="page-progress" aria-hidden="true"></div>
  <header id="navbar" class="navbar" role="banner"></header>

  <main>
    <div class="page-hero">
      <div class="container">
        <p class="page-hero__eyebrow">📰 Latest</p>
        <h1 class="page-hero__title">News & Updates</h1>
        <p class="page-hero__desc">
          Stay informed with the latest announcements, events, and developments from the forum.
        </p>
      </div>
    </div>

    <section class="section--sm">
      <div class="container">
        <!-- Filter bar -->
        <div class="filter-bar" id="news-filter-bar" role="group" aria-label="Filter by category">
          <button class="filter-btn is-active" data-filter="All">All</button>
        </div>
        <!-- News grid -->
        <div class="grid grid--3" id="news-grid" role="list">
          <!-- Populated by news.js -->
        </div>
      </div>
    </section>
  </main>

  <footer id="footer" class="footer" role="contentinfo"></footer>
  <div id="toast-container" class="toast-container" aria-live="polite"></div>
</body>
</html>
